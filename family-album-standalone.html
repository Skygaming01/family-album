<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Family Album</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg1: #0a0a12;
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --glass-border: rgba(255,255,255,0.12);
  --glass-border-hover: rgba(255,255,255,0.28);
  --glass-modal: rgba(14,14,24,0.88);
  --accent: #a78bfa;
  --accent2: #818cf8;
  --accent-glow: rgba(167,139,250,0.28);
  --text: #f0eeff;
  --text2: #a09bb8;
  --text3: #6b6680;
  --danger: #f87171;
  --radius: 20px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg1);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ambient orbs */
.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
}
.orb1 { width:520px;height:520px; background:radial-gradient(circle,rgba(99,102,241,0.18) 0%,transparent 70%); top:-160px;left:-120px; }
.orb2 { width:420px;height:420px; background:radial-gradient(circle,rgba(167,139,250,0.13) 0%,transparent 70%); bottom:-100px;right:-80px; }
.orb3 { width:300px;height:300px; background:radial-gradient(circle,rgba(52,211,153,0.07) 0%,transparent 70%); top:40%;left:50%;transform:translate(-50%,-50%); }

/* HEADER */
.app-header {
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  background:rgba(8,8,16,0.78);
  border-bottom:1px solid var(--glass-border);
  padding:0.85rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
}
.logo { display:flex;align-items:center;gap:10px; }
.logo-icon {
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 0 20px var(--accent-glow);
}
.logo-text {
  font-family:Georgia,serif;
  font-size:20px;font-weight:600;
  color:var(--text);letter-spacing:0.02em;
}
.header-pill {
  font-size:11px;font-weight:500;color:var(--text3);
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:20px;padding:4px 12px;
}

/* PAGES */
.page { display:none;padding:1.5rem;max-width:680px;margin:0 auto;position:relative;z-index:1; }
.page.active { display:block; }

.section-label {
  font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:1rem;margin-top:0.25rem;
}

/* MEMBERS GRID */
.members-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;margin-bottom:2rem;
}

.member-card {
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  padding:1.25rem 1rem 1rem;
  text-align:center;cursor:pointer;
  transition:transform 0.2s,border-color 0.2s,background 0.2s,box-shadow 0.2s;
  position:relative;overflow:hidden;
}
.member-card::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.055) 0%,transparent 55%);
  pointer-events:none;
}
.member-card:hover {
  transform:translateY(-5px);
  border-color:rgba(167,139,250,0.55);
  background:var(--glass-hover);
  box-shadow:0 10px 40px rgba(99,102,241,0.22),0 0 0 1px rgba(167,139,250,0.18);
}
.member-card:active { transform:scale(0.97); }

.avatar {
  width:56px;height:56px;border-radius:50%;
  margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;
  position:relative;overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.18);
}
.avatar img { width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%; }

.member-name { font-size:14px;font-weight:600;color:var(--text); }
.member-rel  { font-size:12px;color:var(--text3);margin-top:2px; }
.member-count {
  margin-top:8px;font-size:11px;font-weight:600;
  color:var(--accent);
  background:rgba(167,139,250,0.12);
  border:1px solid rgba(167,139,250,0.22);
  border-radius:20px;padding:2px 10px;display:inline-block;
}

.delete-btn {
  position:absolute;top:8px;right:8px;
  width:22px;height:22px;border-radius:50%;
  background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);
  color:var(--danger);font-size:12px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
}
.member-card:hover .delete-btn { display:flex; }

.add-card {
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:transparent;border:1px dashed rgba(255,255,255,0.1);
  border-radius:var(--radius);min-height:152px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;
  transition:border-color 0.2s,color 0.2s,background 0.2s;
}
.add-card:hover { border-color:var(--accent);color:var(--accent);background:rgba(167,139,250,0.05); }
.add-icon { font-size:24px;opacity:0.6; }

/* OVERLAY + MODAL */
.overlay {
  display:none;position:fixed;inset:0;
  background:rgba(4,4,10,0.72);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:100;align-items:center;justify-content:center;padding:1rem;
}
.overlay.open { display:flex; }

.modal {
  background:var(--glass-modal);
  backdrop-filter:blur(32px) saturate(1.7);
  -webkit-backdrop-filter:blur(32px) saturate(1.7);
  border:1px solid var(--glass-border);
  border-radius:24px;padding:1.75rem;
  width:100%;max-width:360px;
  box-shadow:0 30px 80px rgba(0,0,0,0.55),0 0 0 1px rgba(167,139,250,0.07);
}
.modal h3 {
  font-family:Georgia,serif;
  font-size:22px;font-weight:600;
  margin-bottom:1.25rem;
  background:linear-gradient(120deg,var(--text) 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.form-field { margin-bottom:14px; }
.form-field label {
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;
}
.form-field input {
  width:100%;padding:10px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--glass-border);border-radius:12px;
  font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--text);
  outline:none;transition:border-color 0.15s,background 0.15s;
}
.form-field input::placeholder { color:var(--text3); }
.form-field input:focus { border-color:var(--accent);background:rgba(167,139,250,0.07); }

.color-row { display:flex;gap:8px;flex-wrap:wrap; }
.cdot {
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;
  transition:transform 0.12s,border-color 0.12s;
  box-shadow:0 0 0 1px rgba(255,255,255,0.1);
}
.cdot.sel { border-color:#fff;transform:scale(1.22);box-shadow:0 0 12px rgba(255,255,255,0.3); }

.modal-btns { display:flex;gap:8px;margin-top:1.25rem; }
.btn {
  flex:1;padding:11px;border-radius:12px;
  font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;border:none;
  transition:opacity 0.15s,transform 0.1s,box-shadow 0.15s;
}
.btn:active { transform:scale(0.97); }
.btn-primary {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 4px 22px var(--accent-glow);
}
.btn-primary:hover { opacity:0.9;box-shadow:0 6px 30px var(--accent-glow); }
.btn-ghost {
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);
  color:var(--text2);
}
.btn-ghost:hover { background:rgba(255,255,255,0.10); }

/* GALLERY PAGE */
.back-row { margin-bottom:1.25rem; }
.back-btn {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;padding:7px 16px;
  font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:500;
  color:var(--text2);cursor:pointer;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:border-color 0.15s,color 0.15s,background 0.15s;
}
.back-btn:hover { border-color:var(--accent);color:var(--accent);background:rgba(167,139,250,0.08); }

.gallery-hero {
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:1.25rem;
  display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;
  position:relative;overflow:hidden;
}
.gallery-hero::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(167,139,250,0.08) 0%,transparent 55%);
  pointer-events:none;
}
.hero-avatar {
  width:58px;height:58px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:600;
  position:relative;overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.18);
}
.hero-avatar img { width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%; }
.hero-info h2 {
  font-family:Georgia,serif;font-size:22px;font-weight:600;
  background:linear-gradient(120deg,var(--text) 50%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-info p { font-size:13px;color:var(--text3);margin-top:2px; }
.hero-count { margin-top:6px;font-size:12px;font-weight:600;color:var(--accent); }

/* PHOTOS GRID */
.photos-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }

.photo-tile {
  aspect-ratio:1;border-radius:14px;overflow:hidden;
  border:1px solid var(--glass-border);cursor:pointer;
  position:relative;
  background:var(--glass);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform 0.18s,box-shadow 0.18s,border-color 0.18s;
}
.photo-tile:hover { transform:scale(1.04);border-color:rgba(167,139,250,0.5);box-shadow:0 8px 28px rgba(99,102,241,0.28); }
.photo-tile img { width:100%;height:100%;object-fit:cover;display:block; }

.empty-tile {
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  border:1px dashed rgba(255,255,255,0.09);
}
.empty-tile:hover { border-color:rgba(167,139,250,0.4); }
.tile-icon { font-size:22px;opacity:0.45; }
.tile-label { font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase; }

.tile-overlay {
  position:absolute;inset:0;
  background:rgba(5,5,14,0.62);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;gap:8px;
  opacity:0;transition:opacity 0.18s;border-radius:13px;
}
.photo-tile:hover .tile-overlay { opacity:1; }
.tile-action {
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);
  border-radius:10px;width:38px;height:38px;
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;transition:background 0.12s;
  backdrop-filter:blur(6px);
}
.tile-action:hover { background:rgba(255,255,255,0.22); }

/* LIGHTBOX */
.lightbox {
  display:none;position:fixed;inset:0;
  background:rgba(4,4,12,0.93);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  z-index:200;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;padding:1.5rem;
}
.lightbox.open { display:flex; }
.lightbox img {
  max-width:100%;max-height:68vh;border-radius:16px;object-fit:contain;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 24px 70px rgba(0,0,0,0.55);
}
.lightbox-btns { display:flex;gap:10px;flex-wrap:wrap;justify-content:center; }
.lb-btn {
  padding:10px 20px;border-radius:12px;
  font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;font-weight:600;
  border:none;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  transition:opacity 0.15s,transform 0.1s;
}
.lb-btn:active { transform:scale(0.97); }
.lb-close { background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:var(--text2); }
.lb-close:hover { background:rgba(255,255,255,0.14); }
.lb-download { background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px var(--accent-glow); }
.lb-download:hover { opacity:0.9; }
.lb-delete { background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.25);color:var(--danger); }
.lb-delete:hover { background:rgba(248,113,113,0.22); }

/* TOAST */
.toast {
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(22,20,38,0.92);
  backdrop-filter:blur(20px);border:1px solid var(--glass-border);
  color:var(--text);padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:300;white-space:nowrap;
  transition:transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,0.45);
}
.toast.show { transform:translateX(-50%) translateY(0); }

input[type="file"] { display:none; }</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<header class="app-header">
  <div class="logo">
    <div class="logo-icon">📸</div>
    <span class="logo-text">Family Album</span>
  </div>
  <span class="header-pill">Saved on your device</span>
</header>

<!-- HOME -->
<div class="page active" id="homePage">
  <p class="section-label" style="margin-top:1rem;">Family Members</p>
  <div class="members-grid" id="membersGrid"></div>
</div>

<!-- GALLERY -->
<div class="page" id="galleryPage">
  <div class="back-row"><button class="back-btn" onclick="goHome()">← Back</button></div>
  <div class="gallery-hero">
    <div class="hero-avatar" id="heroAvatar"></div>
    <div class="hero-info">
      <h2 id="heroName"></h2>
      <p id="heroRel"></p>
      <p class="hero-count" id="heroCount"></p>
    </div>
  </div>
  <div class="photos-grid" id="photosGrid"></div>
</div>

<!-- ADD MEMBER OVERLAY -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h3>Add Family Member</h3>
    <div class="form-field">
      <label>Name</label>
      <input type="text" id="inputName" placeholder="e.g. Priya Didi" />
    </div>
    <div class="form-field">
      <label>Relation</label>
      <input type="text" id="inputRel" placeholder="e.g. Bhabhi, Chacha, Didi…" />
    </div>
    <div class="form-field">
      <label>Colour</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewMember()">Add Member</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lbImg" src="" alt="Photo" />
  <div class="lightbox-btns">
    <button class="lb-btn lb-close" onclick="closeLightbox()">✕ Close</button>
    <button class="lb-btn lb-download" onclick="downloadPhoto()">⬇ Download</button>
    <button class="lb-btn lb-delete" onclick="deletePhoto()">🗑 Delete</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)" />

<script>
const PALETTE = [
  { bg:'rgba(167,139,250,0.28)', text:'#e0d4ff', dot:'#a78bfa' },
  { bg:'rgba(129,140,248,0.28)', text:'#d4d8ff', dot:'#818cf8' },
  { bg:'rgba(52,211,153,0.24)',  text:'#bbf7d0', dot:'#34d399' },
  { bg:'rgba(251,146,60,0.24)',  text:'#fed7aa', dot:'#fb923c' },
  { bg:'rgba(248,113,113,0.24)', text:'#fecaca', dot:'#f87171' },
  { bg:'rgba(236,72,153,0.24)',  text:'#fbcfe8', dot:'#ec4899' },
  { bg:'rgba(250,204,21,0.24)',  text:'#fef08a', dot:'#facc15' },
  { bg:'rgba(34,211,238,0.24)',  text:'#a5f3fc', dot:'#22d3ee' },
];

const STORAGE_KEY = 'familyAlbum_v3';
let state = { members:[], nextId:1 };
let currentMemberId=null, currentSlot=null, lightboxSlot=null, selectedColorIdx=0;

function loadState() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) state=JSON.parse(r); } catch(e){}
  if (!state.members.length) {
    state.members = [
      {id:1,name:'Mamu', relation:'Mama ji', colorIdx:0,photos:Array(9).fill(null)},
      {id:2,name:'Mami', relation:'Mami ji', colorIdx:4,photos:Array(9).fill(null)},
      {id:3,name:'Rahul',relation:'Cousin',  colorIdx:2,photos:Array(9).fill(null)},
      {id:4,name:'Priya',relation:'Cousin',  colorIdx:5,photos:Array(9).fill(null)},
    ];
    state.nextId=5; saveState();
  }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); } catch(e) { showToast('Storage full — remove some photos'); }
}
function initials(n) { return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function renderHome() {
  const grid=document.getElementById('membersGrid');
  let html='';
  state.members.forEach(m=>{
    const c=PALETTE[m.colorIdx]||PALETTE[0];
    const cnt=(m.photos||[]).filter(Boolean).length;
    const fp=(m.photos||[]).find(Boolean);
    const av=fp?`<img src="${fp}" alt="${m.name}"/>`:`${initials(m.name)}`;
    html+=`<div class="member-card" onclick="openGallery(${m.id})">
      <button class="delete-btn" onclick="event.stopPropagation();deleteMember(${m.id})">✕</button>
      <div class="avatar" style="background:${c.bg};color:${c.text};">${av}</div>
      <div class="member-name">${m.name}</div>
      <div class="member-rel">${m.relation}</div>
      <div class="member-count">${cnt} photo${cnt!==1?'s':''}</div>
    </div>`;
  });
  html+=`<div class="add-card" onclick="openAddModal()"><span class="add-icon">＋</span><span>Add Member</span></div>`;
  grid.innerHTML=html;
}

function openGallery(id) {
  currentMemberId=id;
  const m=state.members.find(x=>x.id===id); if(!m) return;
  const c=PALETTE[m.colorIdx]||PALETTE[0];
  const fp=(m.photos||[]).find(Boolean);
  const ha=document.getElementById('heroAvatar');
  ha.style.background=c.bg; ha.style.color=c.text;
  ha.innerHTML=fp?`<img src="${fp}" alt="${m.name}"/>`:initials(m.name);
  document.getElementById('heroName').textContent=m.name;
  document.getElementById('heroRel').textContent=m.relation;
  const cnt=(m.photos||[]).filter(Boolean).length;
  document.getElementById('heroCount').textContent=`${cnt} photo${cnt!==1?'s':''} saved`;
  renderPhotos(m);
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('galleryPage').classList.add('active');
}

function renderPhotos(m) {
  const grid=document.getElementById('photosGrid'); let html='';
  (m.photos||[]).forEach((p,i)=>{
    if(p){
      html+=`<div class="photo-tile" onclick="openLightbox(${i})">
        <img src="${p}" alt="Photo ${i+1}"/>
        <div class="tile-overlay">
          <button class="tile-action" onclick="event.stopPropagation();openLightbox(${i})">🔍</button>
          <button class="tile-action" onclick="event.stopPropagation();downloadPhotoAt(${i})">⬇</button>
        </div>
      </div>`;
    } else {
      html+=`<div class="photo-tile empty-tile" onclick="triggerUpload(${i})">
        <span class="tile-icon">📷</span><span class="tile-label">Add Photo</span>
      </div>`;
    }
  });
  if((m.photos||[]).every(Boolean))
    html+=`<div class="photo-tile empty-tile" onclick="addSlotAndUpload()"><span class="tile-icon">＋</span><span class="tile-label">More</span></div>`;
  grid.innerHTML=html;
}

function goHome() {
  currentMemberId=null;
  document.getElementById('galleryPage').classList.remove('active');
  document.getElementById('homePage').classList.add('active');
  renderHome();
}

function triggerUpload(slot){ currentSlot=slot; document.getElementById('fileInput').click(); }
function addSlotAndUpload(){
  const m=state.members.find(x=>x.id===currentMemberId); if(!m) return;
  m.photos.push(null); currentSlot=m.photos.length-1;
  document.getElementById('fileInput').click();
}
function handleUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const m=state.members.find(x=>x.id===currentMemberId); if(!m||currentSlot===null) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    m.photos[currentSlot]=ev.target.result; saveState(); renderPhotos(m);
    const cnt=m.photos.filter(Boolean).length;
    document.getElementById('heroCount').textContent=`${cnt} photo${cnt!==1?'s':''} saved`;
    showToast('Photo saved ✓'); e.target.value=''; currentSlot=null;
  };
  reader.readAsDataURL(file);
}

function openLightbox(slot){
  const m=state.members.find(x=>x.id===currentMemberId); if(!m||!m.photos[slot]) return;
  lightboxSlot=slot; document.getElementById('lbImg').src=m.photos[slot];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); lightboxSlot=null; }
function downloadPhoto(){ if(lightboxSlot!==null) downloadPhotoAt(lightboxSlot); }
function downloadPhotoAt(slot){
  const m=state.members.find(x=>x.id===currentMemberId); if(!m||!m.photos[slot]) return;
  const a=document.createElement('a');
  a.href=m.photos[slot]; a.download=`${m.name.replace(/\s+/g,'_')}_photo_${slot+1}.jpg`;
  a.click(); showToast('Downloading…');
}
function deletePhoto(){
  const m=state.members.find(x=>x.id===currentMemberId); if(!m||lightboxSlot===null) return;
  if(!confirm('Remove this photo?')) return;
  m.photos[lightboxSlot]=null; saveState(); closeLightbox(); renderPhotos(m); showToast('Photo removed');
}

function openAddModal(){
  selectedColorIdx=0;
  document.getElementById('inputName').value='';
  document.getElementById('inputRel').value='';
  renderColorDots();
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('inputName').focus(),100);
}
function closeAddModal(){ document.getElementById('addOverlay').classList.remove('open'); }
function renderColorDots(){
  document.getElementById('colorRow').innerHTML=PALETTE.map((c,i)=>
    `<div class="cdot${i===selectedColorIdx?' sel':''}" style="background:${c.dot};" onclick="selectedColorIdx=${i};renderColorDots()"></div>`
  ).join('');
}
function saveNewMember(){
  const name=document.getElementById('inputName').value.trim();
  const rel=document.getElementById('inputRel').value.trim();
  if(!name){ showToast('Please enter a name'); return; }
  state.members.push({id:state.nextId++,name,relation:rel||'Family',colorIdx:selectedColorIdx,photos:Array(9).fill(null)});
  saveState(); closeAddModal(); renderHome(); showToast(`${name} added!`);
}
function deleteMember(id){
  const m=state.members.find(x=>x.id===id); if(!m) return;
  if(!confirm(`Remove ${m.name} and all their photos?`)) return;
  state.members=state.members.filter(x=>x.id!==id);
  saveState(); renderHome(); showToast(`${m.name} removed`);
}

let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

document.getElementById('lightbox').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeLightbox(); });
document.getElementById('addOverlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeAddModal(); });

loadState(); renderHome();
</script>
</body>
</html>
